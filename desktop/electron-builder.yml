appId: com.sonoscontroller.app
productName: Sonos Controller

directories:
  output: dist

files:
  - src/**/*
  - package.json

extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/tests/**"
      - "!**/*.pyc"
      - "!**/.git/**"
  - from: ../frontend/dist
    to: frontend_dist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sonos Controller
